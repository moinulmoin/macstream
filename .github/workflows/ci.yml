name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-variants:
    name: Swift ${{ matrix.variant }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            haishinkit: "0"
            mlx: "0"
            test_scope: all
          - variant: HaishinKit
            haishinkit: "1"
            mlx: "0"
            test_scope: none
          - variant: MLX
            haishinkit: "0"
            mlx: "1"
            test_scope: none
          - variant: combined
            haishinkit: "1"
            mlx: "1"
            test_scope: optional

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify optional dependency lockfile
        shell: bash
        run: |
          set -euo pipefail
          MAC_STREAM_ENABLE_HAISHINKIT=1 MAC_STREAM_ENABLE_MLX=1 swift package resolve
          git diff --exit-code Package.resolved

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Run full test suite
        if: matrix.test_scope == 'all'
        shell: bash
        env:
          MAC_STREAM_ENABLE_HAISHINKIT: ${{ matrix.haishinkit }}
          MAC_STREAM_ENABLE_MLX: ${{ matrix.mlx }}
        run: swift test

      - name: Run optional feature contract tests
        if: matrix.test_scope == 'optional'
        shell: bash
        env:
          MAC_STREAM_ENABLE_HAISHINKIT: ${{ matrix.haishinkit }}
          MAC_STREAM_ENABLE_MLX: ${{ matrix.mlx }}
        run: >-
          swift test --filter
          'haishinKitPublisherSendsSyntheticVideoToConfiguredRTMPIngest|mlxLocalProvider(ExposesSetupPlanDecoder|FallsBackWhenRuntimeIsNotLinked)'

      - name: Build release app
        shell: bash
        env:
          MAC_STREAM_ENABLE_HAISHINKIT: ${{ matrix.haishinkit }}
          MAC_STREAM_ENABLE_MLX: ${{ matrix.mlx }}
        run: swift build -c release --arch arm64

  bundle-smoke:
    name: Bundle smoke
    runs-on: macos-26
    needs: swift-variants

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Run real RTMP publisher integration
        shell: bash
        env:
          MAC_STREAM_RTMP_INTEGRATION_PREENCODED_VIDEO: "1"
        run: |
          set -euo pipefail
          if ! brew list --versions ffmpeg@7 >/dev/null 2>&1; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install ffmpeg@7
          fi
          ffmpeg_bin="$(brew --prefix ffmpeg@7)/bin"
          echo "$ffmpeg_bin" >>"$GITHUB_PATH"
          export PATH="$ffmpeg_bin:$PATH"
          ffmpeg -version
          ./script/run_rtmp_integration.sh

      - name: Package ad-hoc app bundle smoke
        shell: bash
        env:
          MAC_STREAM_VERSION: 0.5.0
          MAC_STREAM_BUILD_NUMBER: ${{ github.run_number }}
          MAC_STREAM_BUILD_CONFIGURATION: release
          MAC_STREAM_BUILD_ARCH: arm64
          MAC_STREAM_ENABLE_HAISHINKIT: "1"
          MAC_STREAM_CODESIGN_IDENTITY: "-"
          MAC_STREAM_REQUIRE_HARDENED_RUNTIME: "1"
          MAC_STREAM_REQUIRE_HAISHINKIT: "1"
        run: ./script/package_macos_app.sh

      - name: Upload app bundle smoke artifact
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent dist/MacStream.app dist/MacStream-ci-macos-arm64.zip

      - name: Store app bundle smoke artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: MacStream-ci-macos-arm64
          path: dist/MacStream-ci-macos-arm64.zip
          if-no-files-found: error

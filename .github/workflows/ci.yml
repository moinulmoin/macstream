name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Swift and bundle checks
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify optional dependency lockfile
        shell: bash
        run: |
          set -euo pipefail
          MAC_STREAM_ENABLE_HAISHINKIT=1 MAC_STREAM_ENABLE_MLX=1 swift package resolve
          git diff --exit-code Package.resolved

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Run tests
        shell: bash
        run: swift test

      - name: Build default app
        shell: bash
        run: swift build -c release --arch arm64

      - name: Build optional feature configurations
        shell: bash
        run: |
          set -euo pipefail
          MAC_STREAM_ENABLE_HAISHINKIT=1 swift build -c release --arch arm64
          MAC_STREAM_ENABLE_MLX=1 swift build -c release --arch arm64

      - name: Package ad-hoc app bundle smoke
        shell: bash
        env:
          MAC_STREAM_VERSION: 0.2.0
          MAC_STREAM_BUILD_NUMBER: ${{ github.run_number }}
          MAC_STREAM_BUILD_CONFIGURATION: release
          MAC_STREAM_BUILD_ARCH: arm64
          MAC_STREAM_CODESIGN_IDENTITY: "-"
          MAC_STREAM_REQUIRE_HARDENED_RUNTIME: "1"
        run: ./script/package_macos_app.sh

      - name: Upload app bundle smoke artifact
        shell: bash
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent dist/MacStream.app dist/MacStream-ci-macos-arm64.zip

      - name: Store app bundle smoke artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: MacStream-ci-macos-arm64
          path: dist/MacStream-ci-macos-arm64.zip
          if-no-files-found: error

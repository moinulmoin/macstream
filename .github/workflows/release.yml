name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release tag or dry-run version, for example v0.1.0"
        required: true
        type: string
      publish_release:
        description: "Publish or update the GitHub Release for this tag"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS signed release
    runs-on: macos-26
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      artifact_name: ${{ steps.artifact.outputs.artifact_name }}
      sha256: ${{ steps.artifact.outputs.sha256 }}
      bundle_version: ${{ github.run_number }}
      ed_signature: ${{ steps.sparkle_sign.outputs.ed_signature }}
      ed_length: ${{ steps.sparkle_sign.outputs.ed_length }}
    env:
      APP_NAME: MacStream
      BUNDLE_ID: com.ideaplexa.macstream

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_version="${{ inputs.version }}"
          else
            release_version="$GITHUB_REF_NAME"
          fi

          if [[ ! "$release_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must match vMAJOR.MINOR.PATCH; got '$release_version'" >&2
            exit 2
          fi

          echo "release_version=$release_version" >>"$GITHUB_OUTPUT"
          echo "bundle_version=${release_version#v}" >>"$GITHUB_OUTPUT"

      - name: Check out manual release tag
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${{ steps.version.outputs.release_version }}" >/dev/null
          git checkout --detach "refs/tags/${{ steps.version.outputs.release_version }}"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Run tests
        shell: bash
        run: swift test

      - name: Build optional feature configurations
        shell: bash
        run: |
          set -euo pipefail
          MAC_STREAM_ENABLE_HAISHINKIT=1 swift build -c release --arch arm64
          MAC_STREAM_ENABLE_MLX=1 swift build -c release --arch arm64

      - name: Validate signing and notarization secrets
        shell: bash
        env:
          MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64 }}
          MAC_STREAM_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MAC_STREAM_MACOS_CERTIFICATE_PASSWORD }}
          MAC_STREAM_CODESIGN_IDENTITY: ${{ secrets.MAC_STREAM_CODESIGN_IDENTITY }}
          MAC_STREAM_APPLE_ID: ${{ secrets.MAC_STREAM_APPLE_ID }}
          MAC_STREAM_APPLE_TEAM_ID: ${{ secrets.MAC_STREAM_APPLE_TEAM_ID }}
          MAC_STREAM_APP_SPECIFIC_PASSWORD: ${{ secrets.MAC_STREAM_APP_SPECIFIC_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          required=(
            MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64
            MAC_STREAM_MACOS_CERTIFICATE_PASSWORD
            MAC_STREAM_CODESIGN_IDENTITY
            MAC_STREAM_APPLE_ID
            MAC_STREAM_APPLE_TEAM_ID
            MAC_STREAM_APP_SPECIFIC_PASSWORD
            SPARKLE_PRIVATE_KEY
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub secret: $name" >&2
              exit 2
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        env:
          MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64 }}
          MAC_STREAM_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MAC_STREAM_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/macstream-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/macstream-developer-id.p12"

          /usr/bin/base64 -D <<<"$MAC_STREAM_MACOS_CERTIFICATE_P12_BASE64" >"$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MAC_STREAM_MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Package signed app
        id: package
        shell: bash
        env:
          MAC_STREAM_VERSION: ${{ steps.version.outputs.bundle_version }}
          MAC_STREAM_BUILD_NUMBER: ${{ github.run_number }}
          MAC_STREAM_BUILD_CONFIGURATION: release
          MAC_STREAM_BUILD_ARCH: arm64
          MAC_STREAM_CODESIGN_IDENTITY: ${{ secrets.MAC_STREAM_CODESIGN_IDENTITY }}
          MAC_STREAM_REQUIRE_DEVELOPER_ID: "1"
          MAC_STREAM_REQUIRE_HARDENED_RUNTIME: "1"
        run: ./script/package_macos_app.sh

      - name: Notarize and staple app
        shell: bash
        env:
          MAC_STREAM_APPLE_ID: ${{ secrets.MAC_STREAM_APPLE_ID }}
          MAC_STREAM_APPLE_TEAM_ID: ${{ secrets.MAC_STREAM_APPLE_TEAM_ID }}
          MAC_STREAM_APP_SPECIFIC_PASSWORD: ${{ secrets.MAC_STREAM_APP_SPECIFIC_PASSWORD }}
          APP_PATH: ${{ steps.package.outputs.app_path }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          notary_zip="$RUNNER_TEMP/${APP_NAME}-${RELEASE_VERSION}-notary.zip"
          rm -f "$notary_zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$notary_zip"

          xcrun notarytool submit "$notary_zip" \
            --apple-id "$MAC_STREAM_APPLE_ID" \
            --team-id "$MAC_STREAM_APPLE_TEAM_ID" \
            --password "$MAC_STREAM_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"

      - name: Create release artifact
        id: artifact
        shell: bash
        env:
          APP_PATH: ${{ steps.package.outputs.app_path }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          artifact_name="${APP_NAME}-${RELEASE_VERSION}-macos-arm64.zip"
          zip_path="$PWD/dist/$artifact_name"
          rm -f "$zip_path"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$zip_path"
          sha256="$(shasum -a 256 "$zip_path" | awk '{print $1}')"
          echo "$sha256  $artifact_name" >"$PWD/dist/$artifact_name.sha256"

          {
            echo "artifact_name=$artifact_name"
            echo "zip_path=$zip_path"
            echo "sha256=$sha256"
            echo "sha256_path=$PWD/dist/$artifact_name.sha256"
          } >>"$GITHUB_OUTPUT"

      - name: Sign update for Sparkle appcast
        id: sparkle_sign
        shell: bash
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          ZIP_PATH: ${{ steps.artifact.outputs.zip_path }}
        run: |
          set -euo pipefail
          curl -fsSL -o "$RUNNER_TEMP/Sparkle.tar.xz" https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz
          tar -xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP"
          SIG_ATTRS="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/Sparkle/bin/sign_update" --ed-key-file - "$ZIP_PATH")"
          ed_signature="$(printf '%s' "$SIG_ATTRS" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          ed_length="$(printf '%s' "$SIG_ATTRS" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"
          if [[ -z "$ed_signature" || -z "$ed_length" ]]; then
            echo "Failed to parse Sparkle sign_update output: $SIG_ATTRS" >&2
            exit 2
          fi
          {
            echo "ed_signature=$ed_signature"
            echo "ed_length=$ed_length"
          } >>"$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: |
            ${{ steps.artifact.outputs.zip_path }}
            ${{ steps.artifact.outputs.sha256_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: macos
    runs-on: macos-26
    if: github.event_name == 'push' || inputs.publish_release == true
    permissions:
      contents: write
      actions: read
    env:
      APP_NAME: MacStream
      BUNDLE_ID: com.ideaplexa.macstream
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download workflow artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ needs.macos.outputs.artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-artifacts"
          gh run download "$GITHUB_RUN_ID" \
            --name "$ARTIFACT_NAME" \
            --dir "$RUNNER_TEMP/release-artifacts"

      - name: Write release notes
        id: notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.macos.outputs.release_version }}
          ARTIFACT_NAME: ${{ needs.macos.outputs.artifact_name }}
          SHA256: ${{ needs.macos.outputs.sha256 }}
        run: |
          set -euo pipefail
          notes_path="$RUNNER_TEMP/macstream-release-notes.md"
          {
            echo "## MacStream $RELEASE_VERSION"
            echo
            echo "Signed and notarized macOS artifact:"
            echo
            echo "- Artifact: \`$ARTIFACT_NAME\`"
            echo "- SHA256: \`$SHA256\`"
            echo "- Bundle ID: \`$BUNDLE_ID\`"
            echo "- Hardened runtime: enabled"
            echo "- Notarization: submitted with \`xcrun notarytool\` and stapled"
            echo
            echo "Verification:"
            echo
            echo "\`\`\`bash"
            echo "shasum -a 256 \"$ARTIFACT_NAME\""
            echo "codesign --verify --strict \"MacStream.app\""
            echo "spctl -a -vv --type execute \"MacStream.app\""
            echo "xcrun stapler validate \"MacStream.app\""
            echo "\`\`\`"
          } >"$notes_path"
          echo "notes_path=$notes_path" >>"$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.macos.outputs.release_version }}
          ARTIFACT_NAME: ${{ needs.macos.outputs.artifact_name }}
          ZIP_PATH: ${{ runner.temp }}/release-artifacts/${{ needs.macos.outputs.artifact_name }}
          SHA256_PATH: ${{ runner.temp }}/release-artifacts/${{ needs.macos.outputs.artifact_name }}.sha256
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$RELEASE_VERSION" >/dev/null; then
            echo "Missing release tag: $RELEASE_VERSION" >&2
            exit 2
          fi

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" "$ZIP_PATH" "$SHA256_PATH" --clobber
            gh release edit "$RELEASE_VERSION" \
              --title "MacStream $RELEASE_VERSION" \
              --notes-file "$NOTES_PATH"
          else
            gh release create "$RELEASE_VERSION" "$ZIP_PATH" "$SHA256_PATH" \
              --verify-tag \
              --title "MacStream $RELEASE_VERSION" \
              --notes-file "$NOTES_PATH"
          fi

      - name: Update Sparkle appcast on main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Commit Sparkle appcast
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.macos.outputs.release_version }}
          ARTIFACT_NAME: ${{ needs.macos.outputs.artifact_name }}
          BUNDLE_VERSION: ${{ needs.macos.outputs.bundle_version }}
          ED_SIGNATURE: ${{ needs.macos.outputs.ed_signature }}
          ED_LENGTH: ${{ needs.macos.outputs.ed_length }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          short_version="${RELEASE_VERSION#v}"
          pub_date="$(LC_ALL=C date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          enclosure_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_VERSION}/${ARTIFACT_NAME}"
          release_link="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_VERSION}"
          python3 - "$short_version" "$BUNDLE_VERSION" "$pub_date" "$enclosure_url" "$release_link" "$ED_SIGNATURE" "$ED_LENGTH" "$RELEASE_VERSION" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          short_version, bundle_version, pub_date, enclosure_url, release_link, ed_signature, ed_length, release_version = sys.argv[1:9]
          sparkle_ns = "http://www.andymatuschak.org/xml-namespaces/sparkle"
          ET.register_namespace("sparkle", sparkle_ns)

          path = "appcast.xml"
          tree = ET.parse(path)
          root = tree.getroot()
          channel = root.find("channel")
          if channel is None:
              raise SystemExit("appcast.xml: missing <channel>")

          def sparkle_tag(local):
              return f"{{{sparkle_ns}}}{local}"

          for item in list(channel.findall("item")):
              sv = item.find(sparkle_tag("shortVersionString"))
              if sv is not None and (sv.text or "").strip() == short_version:
                  channel.remove(item)

          item = ET.Element("item")
          ET.SubElement(item, "title").text = f"MacStream {release_version}"
          ET.SubElement(item, "link").text = release_link
          ET.SubElement(item, sparkle_tag("version")).text = bundle_version
          ET.SubElement(item, sparkle_tag("shortVersionString")).text = short_version
          ET.SubElement(item, "pubDate").text = pub_date
          ET.SubElement(
              item,
              "enclosure",
              {
                  "url": enclosure_url,
                  sparkle_tag("edSignature"): ed_signature,
                  "length": ed_length,
                  "type": "application/octet-stream",
              },
          )
          ET.SubElement(item, sparkle_tag("minimumSystemVersion")).text = "26.0"

          first_item = channel.find("item")
          if first_item is not None:
              index = list(channel).index(first_item)
              channel.insert(index, item)
          else:
              channel.append(item)

          tree.write(path, encoding="utf-8", xml_declaration=True)
          PY

          if git diff --quiet -- appcast.xml; then
            echo "appcast.xml unchanged; skipping push"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: publish Sparkle appcast for ${RELEASE_VERSION}"
          git push origin HEAD:main
name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release tag or dry-run version, for example v0.1.0"
        required: true
        type: string
      publish_release:
        description: "Publish or update the GitHub Release for this tag"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS signed release
    runs-on: macos-26
    env:
      APP_NAME: OpenCue
      BUNDLE_ID: com.ideaplexa.opencue

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_version="${{ inputs.version }}"
          else
            release_version="$GITHUB_REF_NAME"
          fi

          if [[ ! "$release_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must match vMAJOR.MINOR.PATCH; got '$release_version'" >&2
            exit 2
          fi

          echo "release_version=$release_version" >>"$GITHUB_OUTPUT"
          echo "bundle_version=${release_version#v}" >>"$GITHUB_OUTPUT"

      - name: Check out manual release tag
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${{ steps.version.outputs.release_version }}" >/dev/null
          git checkout --detach "refs/tags/${{ steps.version.outputs.release_version }}"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Run tests
        shell: bash
        run: swift test

      - name: Build optional feature configurations
        shell: bash
        run: |
          set -euo pipefail
          OPEN_CUE_ENABLE_HAISHINKIT=1 swift build -c release --arch arm64
          OPEN_CUE_ENABLE_MLX=1 swift build -c release --arch arm64

      - name: Validate signing and notarization secrets
        shell: bash
        env:
          OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64 }}
          OPEN_CUE_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.OPEN_CUE_MACOS_CERTIFICATE_PASSWORD }}
          OPEN_CUE_CODESIGN_IDENTITY: ${{ secrets.OPEN_CUE_CODESIGN_IDENTITY }}
          OPEN_CUE_APPLE_ID: ${{ secrets.OPEN_CUE_APPLE_ID }}
          OPEN_CUE_APPLE_TEAM_ID: ${{ secrets.OPEN_CUE_APPLE_TEAM_ID }}
          OPEN_CUE_APP_SPECIFIC_PASSWORD: ${{ secrets.OPEN_CUE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64
            OPEN_CUE_MACOS_CERTIFICATE_PASSWORD
            OPEN_CUE_CODESIGN_IDENTITY
            OPEN_CUE_APPLE_ID
            OPEN_CUE_APPLE_TEAM_ID
            OPEN_CUE_APP_SPECIFIC_PASSWORD
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required GitHub secret: $name" >&2
              exit 2
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        env:
          OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64 }}
          OPEN_CUE_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.OPEN_CUE_MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/opencue-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/opencue-developer-id.p12"

          /usr/bin/base64 -D <<<"$OPEN_CUE_MACOS_CERTIFICATE_P12_BASE64" >"$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$OPEN_CUE_MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Package signed app
        id: package
        shell: bash
        env:
          OPEN_CUE_VERSION: ${{ steps.version.outputs.bundle_version }}
          OPEN_CUE_BUILD_NUMBER: ${{ github.run_number }}
          OPEN_CUE_BUILD_CONFIGURATION: release
          OPEN_CUE_BUILD_ARCH: arm64
          OPEN_CUE_CODESIGN_IDENTITY: ${{ secrets.OPEN_CUE_CODESIGN_IDENTITY }}
          OPEN_CUE_REQUIRE_DEVELOPER_ID: "1"
          OPEN_CUE_REQUIRE_HARDENED_RUNTIME: "1"
        run: ./script/package_macos_app.sh

      - name: Notarize and staple app
        shell: bash
        env:
          OPEN_CUE_APPLE_ID: ${{ secrets.OPEN_CUE_APPLE_ID }}
          OPEN_CUE_APPLE_TEAM_ID: ${{ secrets.OPEN_CUE_APPLE_TEAM_ID }}
          OPEN_CUE_APP_SPECIFIC_PASSWORD: ${{ secrets.OPEN_CUE_APP_SPECIFIC_PASSWORD }}
          APP_PATH: ${{ steps.package.outputs.app_path }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          notary_zip="$RUNNER_TEMP/${APP_NAME}-${RELEASE_VERSION}-notary.zip"
          rm -f "$notary_zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$notary_zip"

          xcrun notarytool submit "$notary_zip" \
            --apple-id "$OPEN_CUE_APPLE_ID" \
            --team-id "$OPEN_CUE_APPLE_TEAM_ID" \
            --password "$OPEN_CUE_APP_SPECIFIC_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"

      - name: Create release artifact
        id: artifact
        shell: bash
        env:
          APP_PATH: ${{ steps.package.outputs.app_path }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          set -euo pipefail
          artifact_name="${APP_NAME}-${RELEASE_VERSION}-macos-arm64.zip"
          zip_path="$PWD/dist/$artifact_name"
          rm -f "$zip_path"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$zip_path"
          sha256="$(shasum -a 256 "$zip_path" | awk '{print $1}')"
          echo "$sha256  $artifact_name" >"$PWD/dist/$artifact_name.sha256"

          {
            echo "artifact_name=$artifact_name"
            echo "zip_path=$zip_path"
            echo "sha256=$sha256"
            echo "sha256_path=$PWD/dist/$artifact_name.sha256"
          } >>"$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: |
            ${{ steps.artifact.outputs.zip_path }}
            ${{ steps.artifact.outputs.sha256_path }}
          if-no-files-found: error

      - name: Write release notes
        id: notes
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
          SHA256: ${{ steps.artifact.outputs.sha256 }}
        run: |
          set -euo pipefail
          notes_path="$RUNNER_TEMP/opencue-release-notes.md"
          {
            echo "## OpenCue $RELEASE_VERSION"
            echo
            echo "Signed and notarized macOS artifact:"
            echo
            echo "- Artifact: \`$ARTIFACT_NAME\`"
            echo "- SHA256: \`$SHA256\`"
            echo "- Bundle ID: \`$BUNDLE_ID\`"
            echo "- Hardened runtime: enabled"
            echo "- Notarization: submitted with \`xcrun notarytool\` and stapled"
            echo
            echo "Verification:"
            echo
            echo "\`\`\`bash"
            echo "shasum -a 256 \"$ARTIFACT_NAME\""
            echo "codesign --verify --strict \"OpenCue.app\""
            echo "spctl -a -vv --type execute \"OpenCue.app\""
            echo "xcrun stapler validate \"OpenCue.app\""
            echo "\`\`\`"
          } >"$notes_path"
          echo "notes_path=$notes_path" >>"$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.event_name == 'push' || inputs.publish_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          ZIP_PATH: ${{ steps.artifact.outputs.zip_path }}
          SHA256_PATH: ${{ steps.artifact.outputs.sha256_path }}
          NOTES_PATH: ${{ steps.notes.outputs.notes_path }}
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/$RELEASE_VERSION" >/dev/null

          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            gh release upload "$RELEASE_VERSION" "$ZIP_PATH" "$SHA256_PATH" --clobber
            gh release edit "$RELEASE_VERSION" \
              --title "OpenCue $RELEASE_VERSION" \
              --notes-file "$NOTES_PATH"
          else
            gh release create "$RELEASE_VERSION" "$ZIP_PATH" "$SHA256_PATH" \
              --verify-tag \
              --title "OpenCue $RELEASE_VERSION" \
              --notes-file "$NOTES_PATH"
          fi
